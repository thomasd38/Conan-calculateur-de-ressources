<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <title>Conan Exiles - Idle Aquilonien</title>
</head>
<body class="idle-hud-body">
    <main class="idle-simple" aria-label="Interface simple du mini-jeu idle">
        <header class="idle-simple__header">
            <div class="idle-simple__header-left">
                <a class="button button--secondary" href="index.html">← Calculateur</a>
                <h1>Idle Aquilonien</h1>
            </div>
            <div class="idle-header__resources" id="idle-resources" aria-label="Ressources"></div>
        </header>

        <section class="idle-column" aria-label="Colonne actions">
            <h2>Actions</h2>
            <button class="button hud-action-button" id="manual-collect" type="button">Récolter (+énergie)</button>
            <button class="button button--danger hud-action-button" id="button-reset-save-idle" type="button">Réinitialiser la sauvegarde idle</button>
            <div class="idle-action-list" id="idle-actions"></div>
        </section>

        <section class="idle-column" aria-label="Colonne améliorations">
            <h2>Améliorations</h2>
            <div class="idle-upgrades" id="idle-upgrades"></div>
        </section>

        <section class="idle-column" aria-label="Colonne quêtes et objectifs">
            <h2>Quêtes</h2>
            <p class="idle-highlight" id="offline-gain"></p>
            <div class="idle-missions" id="idle-missions"></div>
        </section>
    </main>

    <script src="idle.js"></script>
</body>
</html>
